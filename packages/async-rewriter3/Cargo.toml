[package]
name = "async-rewriter3"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib", "staticlib"]

[[bin]]
name = "async-rewriter3"
path = "src/main.rs"

[dependencies]
oxc_allocator = "0.81.0"
oxc_ast = "0.81.0"
oxc_parser = "0.81.0"
oxc_semantic = "0.81.0"
oxc_span = "0.81.0"
wasm-bindgen = "0.2.112"

[profile.release]
lto = true
